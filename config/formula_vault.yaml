# Payback Period Calculation
payback_calculation:
  formula: "total_project_cost / monthly_value_generated"
  variables:
    - total_project_cost: "Total implementation cost"
    - monthly_value_generated: "Monthly value from BVA"
  unit: "Months to payback"

# ROI Calculation
roi_calculation:
  formula: "((total_value - total_cost) / total_cost) * 100"
  variables:
    - total_value: "Total value generated over period"
    - total_cost: "Total cost of solution"
  unit: "Percentage ROI"

